<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIP Media Queries</title>
    <link rel="stylesheet" href="MediaQ.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <!-- Mobile - upto 480px -->
    <!-- Tab - 481px to 768px -->
    <!-- Laptop 489px to 1024px -->
    <!-- Desktop 1025px++  -->

    <div class="left">
      <div class="images">
        <img src="images (4).jpg" alt="img1" />
        <img src="images (1).jpg" alt="img1" />
        <img src="images (2).jpg" alt="img1" />
        <img src="images (3).jpg" alt="img1" />
        <img src="images.jpg" alt="img1" />
      </div>
    </div>
    <div class="right">
      <div class="arrows">
        <button><i class="fa-solid fa-arrow-up"></i></button>
        <button><i class="fa-solid fa-arrow-down"></i></button>
      </div>

      <div class="title-box">
        <div class="name-line">
          <span class="line"></span>
          <h2>Luffy kun</h2>
          <span class="line"></span>
        </div>
        <p>MARKETING MANAGER</p>
      </div>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>
    </div>
  </body>
</html>
