<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIP CSS Card Task</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color:beige;
        }
        #card{
            width: 300px;
            height: 600px;
            border-radius: 12px;
            
        }
        img{
            width: 300px;
            height: 300px;
        }
        .time{
            color: red;
            text-align: center;
            margin-top: 15px;
            font-size: 20px;     
        }
        .cap{
            font-size: 40px;
            text-align: center;
            margin-top: 0px;
        }
        p{
            text-align: center;
            margin-left: 15px;
            margin-right: 15px;
        }
        table{
            width: 300px;
            background-color: rgb(206, 43, 70);
            line-height: 1.5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-collapse: collapse;
            margin: auto;
            font-size: 20px;
            color: white;
            text-align: center;
            
        }
        td,th{
            border: 1px solid rgb(30, 29, 29);
            padding: 10px;
            width: 100px;
        }
    </style>
  </head>
  <body>
    <div id="card">
      <img src="download.webp" alt="Mountain"/>
      <div class="time">4 days ago</div>
      <h1 class="cap">Post One</h1>
      <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Iusto maiores laborum nisi, iure expedita voluptas sit impedit totam?
      </p>
      <table>
        <tr>
            <td>4 <sup>m</sup> <br> Read</td>
            <td>5123<br>Views</td>
            <td>32<br>Comments</td>
        </tr>
      </table>
    </div>
  </body>
</html>
