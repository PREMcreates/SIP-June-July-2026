<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIP HW Table</title>
    <style>
      table {
        border: 2px solid black;
        border-collapse: collapse;
        width: 100%;
        text-align: center;
      }
      th,
      td {
        border: 1px solid black;
      }
      .break {
        writing-mode: vertical-rl;
        text-orientation: upright;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Time Table</h1>
    <table>
      <table>
        <tr>
          <th></th>
          <th>1</th>
          <th>2</th>
          <th>3</th>
          <th></th>
          <th colspan="3">4</th>
          <th>6</th>
        </tr>
        <tr>
          <th>Mon</th>
          <td>C++</td>
          <td>HTML</td>
          <td>CSS</td>
          <th class="break" rowspan="5">BREAK</th>
          <td colspan="3">Java</td>
          <td>C++</td>
        </tr>
        <tr>
          <th>Tue</th>
          <td rowspan="3">Hindi</td>
          <td colspan="2">WebDev</td>
          <td>C++</td>
          <td>HTMl</td>
          <td>CSS</td>
          <td rowspan="2">OS</td>
        </tr>
        <tr>
          <th>Wed</th>
          <td colspan="2">C++</td>
          <td colspan="3">Django</td>
        </tr>
        <tr>
          <th>Thu</th>
          <td colspan="2">Java</td>
          <td>English</td>
          <td>GO</td>
          <td colspan="2">Networks</td>
        </tr>
        <tr>
          <th>Fri</th>
          <td colspan="3">Data Science</td>
          <td colspan="2">C++</td>
          <td>Go</td>
          <td>Python</td>
        </tr>
      </table>
    </table>
  </body>
</html>
