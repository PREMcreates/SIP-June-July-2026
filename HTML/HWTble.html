<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIP HW Table</title>
    <style>
      *{
        margin: 0;
        padding: 0;
      }
      body{
        background-color:beige;
      }
      h1{
        text-align: center;
        margin: 5px;
        padding: 30px;
        font-size: 50px;
      color: rgb(39, 31, 94);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }
      table {

        border-collapse: collapse;
        width: 100%;
        text-align: center;
        background-color: rgb(255, 255, 255);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        max-width: 1000px;
      }
      th,td {
        border: 1px solid rgb(221, 212, 212);
      }
      .break {
        writing-mode: vertical-rl;
        text-orientation: upright;
        font-weight: bold;
        background-color: rgb(22, 115, 131);
        color: black;
        font-size: 25px;------------------------------------------------------------------------------------
      }
      .header1{
        color: rgb(22, 115, 131);
        padding: 10px;
        font-size: 20px;
      }
      .Week{
        
        color: rgb(22, 115, 131);
        padding: 10px;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Time Table</h1>
    <table>
      <table>
        <tr>
          <th class="header1"></th>
          <th class="header1">1</th>
          <th class="header1">2</th>
          <th class="header1">3</th>
          <th class="header1" ></th>
          <th class="header1" colspan="3">4</th>
          <th class="header1">6</th>
        </tr>
        <tr>
          <th class="Week">Mon</th>
          <td>C++</td>
          <td>HTML</td>
          <td>CSS</td>
          <th class="break" rowspan="5">BREAK</th>
          <td colspan="3">Java</td>
          <td>C++</td>
        </tr>
        <tr>
          <th class="Week">Tue</th>
          <td rowspan="3">Hindi</td>
          <td colspan="2">WebDev</td>
          <td>C++</td>
          <td>HTMl</td>
          <td>CSS</td>
          <td rowspan="2">OS</td>
        </tr>
        <tr>
          <th class="Week">Wed</th>
          <td colspan="2">C++</td>
          <td colspan="3">Django</td>
        </tr>
        <tr>
          <th class="Week">Thu</th>
          <td colspan="2">Java</td>
          <td>English</td>
          <td>GO</td>
          <td colspan="2">Networks</td>
        </tr>
        <tr>
          <th class="Week">Fri</th>
          <td colspan="3">Data Science</td>
          <td colspan="2">C++</td>
          <td>Go</td>
          <td>Python</td>
        </tr>
      </table>
    </table>
  </body>
</html>
